service:
  name: ad
image:
  repository: 952893849914.dkr.ecr.us-east-1.amazonaws.com/aicares-application/ad
containerPort: 9555
resources:
  limits:
    memory: "300Mi"
  requests:
    memory: "100Mi"
    cpu: "50m"
env:
  - name: AD_PORT
    value: "9555"
  - name: FLAGD_HOST
    value: "flagd"
  - name: FLAGD_PORT
    value: "8013"
  - name: OTEL_SERVICE_NAME
    value: "ad"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://otel-collector:4317"
nodeSelector:
  eks.amazonaws.com/nodegroup: graviton-workers
